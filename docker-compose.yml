services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: adminpanel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d adminpanel"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/adminpanel
      JWT_SECRET: change-me-in-production-use-long-random-string
      NODE_ENV: production
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
