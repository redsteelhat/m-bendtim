services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: adminpanel
    volumes:
      - pgdata_trycloudflare:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d adminpanel"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.trycloudflare
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/adminpanel
      JWT_SECRET: change-me-before-public-use
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: "*"
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: admin123
      SEED_ADMIN_NAME: Yonetici
    depends_on:
      postgres:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://app:4000
    depends_on:
      - app

volumes:
  pgdata_trycloudflare:
